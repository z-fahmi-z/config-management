---
- name: Install and configure Fail2Ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
  
- name: Ensure Fail2Ban log file exists
  ansible.builtin.file:
    path: "{{ fail2ban_log_file }}"
    state: touch
    owner: root
    group: root
    mode: "0644"
       
- name: Create custom log file for SSH authentication failures
  ansible.builtin.file:
    path: "{{ fail2ban_auth_log_file }}"
    state: touch
    owner: root
    group: root
    mode: "0644"

- name: Configure Fail2Ban jail for SSH
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      logtarget = {{ fail2ban_log_file }}
      backend = auto

      [sshd]
      enabled = true
      port = ssh
      maxretry = {{ fail2ban_maxretry }}
      findtime = {{ fail2ban_findtime }}
      bantime = {{ fail2ban_bantime }}
      logpath = {{ fail2ban_auth_log_file }}

- name: Enable Fail2Ban service
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started

- name: Restart Fail2Ban to apply config
  ansible.builtin.service:
    name: fail2ban
    state: restarted